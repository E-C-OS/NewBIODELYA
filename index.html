<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Biodelya</title>

<body>

<div class="bg">
  <div class="blob"></div>
</div>

<div class="background"></div>

<header class="header">
  <div class="logo">Biodelya</div>
  <nav>
    <a href="#">Produit</a>
    <a href="#">Approche</a>
    <a href="#">Applications</a>
    <a href="#">Connexion</a>
  </nav>
</header>

<section class="hero">
  <h1>Comprenez. Analysez. Décidez.</h1>
  <p>Transformez la complexité en décisions claires.</p>

  <div class="cta">
    <button class="btn primary">Essayer</button>
    <button class="btn secondary">Démo</button>
  </div>
</section>

<section class="section grid">
  <div class="card">Analyse avancée</div>
  <div class="card">Décisions éclairées</div>
  <div class="card">Résultats concrets</div>
</section>

<script>

// Animation apparition (scroll)
const cards = document.querySelectorAll('.card');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.style.opacity = 1;
      entry.target.style.transform = "translateY(0)";
    }
  });
});

cards.forEach(card => {
  card.style.opacity = 0;
  card.style.transform = "translateY(40px)";
  observer.observe(card);
});

// Smooth scroll
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function (e) {
    e.preventDefault();
    document.querySelector(this.getAttribute('href'))
      ?.scrollIntoView({ behavior: 'smooth' });
  });
});

</script>

</body>
</html>
